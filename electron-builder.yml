appId: com.timelinelog.app
productName: Timeline Log

directories:
  output: release

files:
  - out/**

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64

nsis:
  artifactName: ${productName}-${version}-setup-${arch}.${ext}

portable:
  artifactName: ${productName}-${version}-portable-${arch}.${ext}
